version: "3.2"
services:
  alice:
    container_name: alice
    image: samelamin/imbue:0.9.20
    ports:
      - "9912:9934"
      - "9914:9944"
      - "30334:30334"
    command: bash -c "wget https://raw.githubusercontent.com/ImbueNetwork/imbue/dev/res/rococo-staging.json;/polkadot --node-key=${NODE_KEY} --unsafe-ws-external --allow-private-ipv4 --rpc-cors all  --log=parity_ws::io=debug --wasm-execution Compiled --rpc-external --rpc-methods Unsafe -d /cumulus_relay/alice --validator --alice --ws-port 9944 --port 30334 --rpc-port 9934 --name alice --chain rococo-staging.json --ws-max-out-buffer-capacity=99999 --ws-max-connections=200"
    volumes:
      - ./imbue_db/cumulus_relay:/cumulus_relay/
    environment:
        NODE_KEY: ${NODE_KEY}

  bob:
    container_name: bob
    image: samelamin/imbue:0.9.20
    ports:
      - "9915:9934"
      - "9916:9944"
      - "30341:30334"
    command: bash -c "wget https://raw.githubusercontent.com/ImbueNetwork/imbue/dev/res/rococo-staging.json;/polkadot --unsafe-ws-external --allow-private-ipv4 --rpc-cors all --wasm-execution Compiled --rpc-external --rpc-methods Unsafe -d /cumulus_relay/bob --validator --bob --ws-port 9944 --port 30334 --rpc-port 9934 --name alice --chain rococo-staging.json --ws-max-out-buffer-capacity=99999"
    volumes:
      - ./imbue_db/cumulus_relay:/cumulus_relay/

  charlie:
    container_name: charlie
    image: samelamin/imbue:0.9.20
    ports:
      - "9917:9934"
      - "9918:9944"
      - "30342:30334"
    command: bash -c "wget https://raw.githubusercontent.com/ImbueNetwork/imbue/dev/res/rococo-staging.json;/polkadot --unsafe-ws-external --allow-private-ipv4 --rpc-cors all --wasm-execution Compiled --rpc-external --rpc-methods Unsafe -d /cumulus_relay/charlie --validator --charlie --ws-port 9944 --port 30334 --rpc-port 9934 --name alice --chain rococo-staging.json --ws-max-out-buffer-capacity=99999"
    volumes:
      - ./imbue_db/cumulus_relay:/cumulus_relay/

  imbue-1:
    container_name: imbue-1
    image: samelamin/imbue:0.9.20
    ports:
      - "9615:9615"
      - "9616:9616"
      - "9942:9942"
      - "9980:9930"
      - "30332:30332"
      - "30333:30333"
    command: bash -c "wget https://raw.githubusercontent.com/ImbueNetwork/imbue/dev/res/imbue-staging.json;wget https://raw.githubusercontent.com/ImbueNetwork/imbue/dev/res/rococo-staging.json;/imbue  --collator --allow-private-ipv4 --unsafe-ws-external --log=parity_ws::io=debug  --rpc-cors=all --rpc-external --rpc-methods=Unsafe -d /cumulus_parachain/imbue-1  --name imbue-collator-1 --ws-port 9942 --rpc-port 9930 --parachain-id 2121 --chain imbue-staging.json --execution=wasm --prometheus-external --port 30332 --node-key=${NODE_KEY} -- --port 30333 --chain rococo-staging.json --execution=wasm --prometheus-external --ws-max-out-buffer-capacity=99999 --ws-max-connections=200"
    volumes:
      - ./imbue_db/cumulus_parachain_1:/cumulus_parachain/
    environment:
        NODE_KEY: ${NODE_KEY}

  imbue-2:
    container_name: imbue-2
    image: samelamin/imbue:0.9.20
    ports:
      - "9662:9615"
      - "9663:9616"
      - "9901:9942"
      - "9981:9930"
      - "31035:31035"
      - "31036:31036"
    command: bash -c "wget https://raw.githubusercontent.com/ImbueNetwork/imbue/dev/res/imbue-staging.json;wget https://raw.githubusercontent.com/ImbueNetwork/imbue/dev/res/rococo-staging.json;/imbue  --collator --allow-private-ipv4 --unsafe-ws-external --rpc-cors=all --rpc-external --rpc-methods=Unsafe -d /cumulus_parachain/imbue-1  --name imbue-collator-1 --ws-port 9942 --rpc-port 9930 --parachain-id 2121 --chain imbue-staging.json --execution=wasm --prometheus-external --port 31035 --  --port 31036 --chain rococo-staging.json --execution=wasm --prometheus-external --ws-max-out-buffer-capacity=99999"
    volumes:
      - ./imbue_db/cumulus_parachain_2:/cumulus_parachain/

  imbue-3:
    container_name: imbue-3
    image: samelamin/imbue:0.9.20
    ports:
      - "9664:9615"
      - "9665:9616"
      - "9902:9942"
      - "9982:9930"
      - "31037:31037"
      - "31038:31038"
    command: bash -c "wget https://raw.githubusercontent.com/ImbueNetwork/imbue/dev/res/imbue-staging.json;/imbue --log=parity_ws::io=debug  --collator --allow-private-ipv4 --unsafe-ws-external --rpc-cors=all --rpc-external --rpc-methods=Unsafe -d /cumulus_parachain/imbue-1  --name imbue-collator-1 --ws-port 9942 --rpc-port 9930 --parachain-id 2121 --chain imbue-staging.json --execution=wasm --prometheus-external --port 31037 --  --port 31038 --chain rococo-local.json --execution=wasm --prometheus-external --ws-max-out-buffer-capacity=99999"
    volumes:
      - ./imbue_db/cumulus_parachain_3:/cumulus_parachain/

  frontend:
    container_name: frontend
    image: jacogr/polkadot-js-apps
    ports:
      - "3001:80"